openapi: 3.0.3
info:
  title: ControlFile Backend API
  version: 1.0.0
  description: Canonical v1 API for ControlFile backend-only architecture.
servers:
  - url: https://controlfile.onrender.com
    description: Production
  - url: http://localhost:3001
    description: Local
security:
  - bearerAuth: []
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
paths:
  /v1/health:
    get:
      summary: Health check
      security: []
      responses:
        '200':
          description: OK

  /v1/files:
    get:
      summary: List files and folders
      parameters:
        - in: query
          name: parentId
          schema: { type: string, nullable: true }
        - in: query
          name: pageSize
          schema: { type: integer }
        - in: query
          name: cursor
          schema: { type: string }
      responses:
        '200': { description: Listed successfully }
        '401': { description: Unauthorized }

  /v1/files/presign-get:
    post:
      summary: Get presigned download URL
      responses:
        '200': { description: URL generated }

  /v1/files/delete:
    post:
      summary: Soft-delete file
      responses:
        '200': { description: Deleted }

  /v1/files/rename:
    post:
      summary: Rename file
      responses:
        '200': { description: Renamed }

  /v1/files/replace:
    post:
      summary: Replace file contents
      responses:
        '200': { description: Replaced }

  /v1/files/zip:
    post:
      summary: Download selected files as ZIP
      responses:
        '200': { description: ZIP stream }

  /v1/uploads/presign:
    post:
      summary: Create upload session
      responses:
        '200': { description: Session created }

  /v1/uploads/confirm:
    post:
      summary: Confirm uploaded object
      responses:
        '200': { description: Upload confirmed }

  /v1/uploads/proxy-upload:
    post:
      summary: Proxy upload via backend (temporary)
      responses:
        '200': { description: Uploaded }

  /v1/folders:
    post:
      summary: Ensure/create folder path (legacy-compatible)
      responses:
        '200': { description: Folder resolved }

  /v1/folders/root:
    get:
      summary: Get or create root folder
      responses:
        '200': { description: Root folder returned }

  /v1/folders/by-slug/{username}/{path}:
    get:
      summary: Get folder by slug path
      parameters:
        - in: path
          name: username
          required: true
          schema: { type: string }
        - in: path
          name: path
          required: true
          schema: { type: string }
      responses:
        '200': { description: Folder found }

  /v1/shares:
    get:
      summary: List my shares
      responses:
        '200': { description: Shares listed }
    post:
      summary: Create share
      responses:
        '200': { description: Share created }

  /v1/shares/revoke:
    post:
      summary: Revoke share
      responses:
        '200': { description: Share revoked }

  /v1/shares/{token}:
    get:
      summary: Get public share info
      security: []
      parameters:
        - in: path
          name: token
          required: true
          schema: { type: string }
      responses:
        '200': { description: Share info }

  /v1/shares/{token}/download:
    post:
      summary: Resolve public share download URL
      security: []
      parameters:
        - in: path
          name: token
          required: true
          schema: { type: string }
      responses:
        '200': { description: Download URL }

  /v1/shares/{token}/image:
    get:
      summary: Resolve public share image URL
      security: []
      parameters:
        - in: path
          name: token
          required: true
          schema: { type: string }
      responses:
        '200': { description: Image stream or redirect }

  /v1/users/profile:
    get:
      summary: Get profile
      responses:
        '200': { description: Profile data }
    put:
      summary: Update profile
      responses:
        '200': { description: Profile updated }

  /v1/users/initialize:
    post:
      summary: Initialize user record
      responses:
        '200': { description: User initialized }

  /v1/users/settings:
    get:
      summary: Get user settings
      responses:
        '200': { description: Settings returned }
    post:
      summary: Save user settings
      responses:
        '200': { description: Settings saved }

  /v1/users/taskbar:
    get:
      summary: Get taskbar items
      responses:
        '200': { description: Taskbar returned }
    post:
      summary: Save taskbar items
      responses:
        '200': { description: Taskbar saved }

  /v1/users/plan:
    post:
      summary: Update user plan metadata
      responses:
        '200': { description: Plan updated }
